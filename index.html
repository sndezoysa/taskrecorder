<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Recorder</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Auth Screen -->
    <div id="authScreen" style="display:none; padding:2rem; text-align:center;">
        <div style="width:50px; height:50px; background:linear-gradient(135deg,#1a4d1a,#2d6b2d); border-radius:50%; margin:0 auto 1rem; display:flex; align-items:center; justify-content:center; color:white; font-size:1.5rem;">✓</div>
        <h2 style="color:#1a4d1a; font-size:1rem; margin-bottom:0.3rem;">Task Recorder</h2>
        <p style="color:#666; font-size:0.8rem; margin-bottom:1.5rem;">Sign in to access your tasks</p>
        <button onclick="signIn()" style="background:#2d6b2d; color:white; border:none; padding:0.6rem 1rem; border-radius:5px; font-size:0.85rem; cursor:pointer; width:100%; font-family:inherit;">
            🔵 Sign in with Google
        </button>
        <div id="authError" style="color:#c0392b; font-size:0.78rem; margin-top:0.6rem;"></div>
    </div>

    <div id="app" style="display:none;">

        <!-- Header -->
        <div class="header">
            <h1>Task Recorder</h1>
            <div style="display:flex; align-items:center; gap:0.5rem;">
                <a href="https://sndezoysa.github.io/taskrecorder/dashboard/"
                   target="_blank"
                   style="color:rgba(255,255,255,0.8); font-size:0.75rem; text-decoration:none; letter-spacing:0.3px;">
                    📊 Dashboard ↗
                </a>
                <span style="color:rgba(255,255,255,0.4);">|</span>
                <button onclick="signOut()" style="background:none; border:none; color:rgba(255,255,255,0.7); font-size:0.72rem; cursor:pointer; padding:0; font-family:inherit;">Sign out</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" onclick="showTab('create')">Create</button>
            <button class="tab" onclick="showTab('pause')">Pause</button>
            <button class="tab" onclick="showTab('resume')">Resume</button>
            <button class="tab" onclick="showTab('close')">Close</button>
        </div>

        <!-- CREATE TAB -->
        <div id="tab-create" class="tab-content active">
            <div class="form-group">
                <label>Subject</label>
                <input type="text" id="txtSubject" placeholder="Click Extract to fill — editable if needed"/>
            </div>
            <div class="form-group">
                <label>Sender</label>
                <input type="text" id="txtSender" readonly placeholder="Click Extract to fill"/>
            </div>
            <div class="form-group">
                <label>Receiver</label>
                <input type="text" id="txtReceiver" readonly placeholder="Click Extract to fill"/>
            </div>
            <div class="form-group">
                <label>Date & Time</label>
                <input type="text" id="txtDateTime" readonly placeholder="Click Extract to fill"/>
            </div>
            <div class="form-group">
                <label>Site/Company</label>
                <select id="cmbSite">
                    <option value="MEDK">MEDK</option>
                    <option value="MELK">MELK</option>
                    <option value="METC">METC</option>
                    <option value="MEIN">MEIN</option>
                    <option value="MEFR">MEFR</option>
                    <option value="MEPT">MEPT</option>
                    <option value="MEMY">MEMY</option>
                    <option value="MEUS">MEUS</option>
                    <option value="FAS">FAS</option>
                    <option value="MEMAF">MEMAF</option>
                    <option value="MAKEEN Other">MAKEEN Other</option>
                    <option value="External">External</option>
                </select>
            </div>
            <div class="form-group">
                <label>Project ID</label>
                <input type="text" id="txtProjectID" placeholder="Optional"/>
            </div>
            <div class="form-group">
                <label>Priority Score</label>
                <select id="txtPriority">
                    <option value="1">1 — Lowest</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5" selected>5 — Medium</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10 — Highest</option>
                </select>
            </div>
            <div class="form-group">
                <label>Task Type</label>
                <div class="radio-group">
                    <label><input type="radio" name="taskType" value="Requested" checked> Requested</label>
                    <label><input type="radio" name="taskType" value="Created"> Created</label>
                    <label><input type="radio" name="taskType" value="QMS Task"> QMS Task</label>
                </div>
            </div>
            <div class="form-group">
                <label>Comments</label>
                <textarea id="txtComments" rows="3" placeholder="Optional comments"></textarea>
            </div>
            <div class="button-row">
                <button class="btn-secondary" onclick="extractEmail()">Extract</button>
                <button class="btn-secondary" onclick="clearCreate()">Clear</button>
                <button class="btn-primary" id="btnCreate" disabled onclick="createTask()">Create</button>
            </div>
            <div id="status-create" class="status-msg"></div>
        </div>

        <!-- PAUSE TAB -->
        <div id="tab-pause" class="tab-content">
            <div class="form-group">
                <label>Active Task</label>
                <select id="cmbActiveTaskPause" onchange="taskSelectedPause()">
                    <option value="">-- Select Task --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Active Since</label>
                <input type="text" id="txtActiveSincePause" readonly/>
            </div>
            <div class="form-group">
                <label>Pause Time</label>
                <input type="text" id="txtDateTimePause" placeholder="yyyy-mm-dd hh:mm"/>
            </div>
            <div class="form-group">
                <label>Comments</label>
                <textarea id="txtCommentsPause" rows="3"></textarea>
            </div>
            <div class="button-row">
                <button class="btn-secondary" onclick="setCurrentTime('pause')">Now</button>
                <button class="btn-secondary" onclick="extractDateTime('pause')">Extract</button>
                <button class="btn-secondary" onclick="clearPause()">Clear</button>
                <button class="btn-primary" id="btnPause" disabled onclick="pauseTask()">Pause</button>
            </div>
            <div id="status-pause" class="status-msg"></div>
        </div>

        <!-- RESUME TAB -->
        <div id="tab-resume" class="tab-content">
            <div class="form-group">
                <label>Paused Task</label>
                <select id="cmbPausedTaskResume" onchange="taskSelectedResume()">
                    <option value="">-- Select Task --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Paused Since</label>
                <input type="text" id="txtPausedSinceResume" readonly/>
            </div>
            <div class="form-group">
                <label>Resume Time</label>
                <input type="text" id="txtDateTimeResume" placeholder="yyyy-mm-dd hh:mm"/>
            </div>
            <div class="form-group">
                <label>Comments</label>
                <textarea id="txtCommentsResume" rows="3"></textarea>
            </div>
            <div class="button-row">
                <button class="btn-secondary" onclick="setCurrentTime('resume')">Now</button>
                <button class="btn-secondary" onclick="extractDateTime('resume')">Extract</button>
                <button class="btn-secondary" onclick="clearResume()">Clear</button>
                <button class="btn-primary" id="btnResume" disabled onclick="resumeTask()">Resume</button>
            </div>
            <div id="status-resume" class="status-msg"></div>
        </div>

        <!-- CLOSE TAB -->
        <div id="tab-close" class="tab-content">
            <div class="form-group">
                <label>Active Task</label>
                <select id="cmbActiveTaskClose" onchange="taskSelectedClose()">
                    <option value="">-- Select Task --</option>
                </select>
            </div>
            <div class="form-group">
                <label>Active Since</label>
                <input type="text" id="txtActiveSinceClose" readonly/>
            </div>
            <div class="form-group">
                <label>Close Time</label>
                <input type="text" id="txtDateTimeClose" placeholder="yyyy-mm-dd hh:mm"/>
            </div>
            <div class="form-group">
                <label>Comments</label>
                <textarea id="txtCommentsClose" rows="3"></textarea>
            </div>
            <div class="button-row">
                <button class="btn-secondary" onclick="setCurrentTime('close')">Now</button>
                <button class="btn-secondary" onclick="extractDateTime('close')">Extract</button>
                <button class="btn-secondary" onclick="clearClose()">Clear</button>
                <button class="btn-primary" id="btnClose" disabled onclick="closeTask()">Close</button>
            </div>
            <div id="status-close" class="status-msg"></div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
